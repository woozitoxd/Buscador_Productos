<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador & Comparador de Perfumes Arg</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f0f4f8 0%, #e8eef5 50%, #f4f1ee 100%);
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        .hero-section {
            padding: 70px 0 35px 0;
        }

        .hero-section h1 {
            letter-spacing: -0.5px;
        }

        .search-container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            padding: 32px;
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(0, 0, 0, 0.04);
        }

        .perfume-card {
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            height: 100%;
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(6px);
        }

        .perfume-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 32px rgba(0, 0, 0, 0.1);
        }

        .store-badge {
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .price-tag {
            font-size: 1.4rem;
            font-weight: 800;
            color: #198754;
        }

        .price-tag-pending {
            font-size: 0.95rem;
            font-weight: 600;
            color: #e67e22;
        }

        .btn-check:checked+.btn-outline-success {
            background-color: #198754;
            border-color: #198754;
            color: white;
        }

        .btn-group .btn {
            font-weight: 500;
            letter-spacing: 0.2px;
        }

        #formulario-busqueda .form-control {
            border-radius: 12px 0 0 12px;
            border: 1px solid #dee2e6;
        }

        #formulario-busqueda .form-control:focus {
            box-shadow: 0 0 0 3px rgba(25, 135, 84, 0.15);
            border-color: #198754;
        }

        #formulario-busqueda .btn {
            border-radius: 0 12px 12px 0;
        }

        .card-title {
            line-height: 1.4;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="row justify-content-center hero-section">
            <div class="col-md-9 text-center">
                <h1 class="display-4 fw-bold mb-2">PerfumeFinder <span class="text-muted">Arg</span></h1>
                <p class="text-muted mb-4">Encontrá fragancias o compará precios en tiempo real.</p>

                <div class="search-container mb-5">
                    <div class="d-flex justify-content-center mb-4">
                        <div class="btn-group shadow-sm" role="group" aria-label="Modo de búsqueda">
                            <input type="radio" class="btn-check" name="modoBusqueda" id="modoGeneral" value="general"
                                checked>
                            <label class="btn btn-outline-dark px-4" for="modoGeneral">Búsqueda General</label>

                            <input type="radio" class="btn-check" name="modoBusqueda" id="modoPrecios" value="precios">
                            <label class="btn btn-outline-success px-4" for="modoPrecios">Comparar Precios</label>
                        </div>
                    </div>

                    <form id="formulario-busqueda" class="input-group input-group-lg">
                        <input type="text" id="input-perfume" class="form-control border-light-subtle"
                            placeholder="Ej: Sauvage, Light Blue, One Million..." required>
                        <button type="submit" class="btn btn-dark px-5">Buscar</button>
                    </form>
                </div>
            </div>
        </div>

        <div id="cargando" class="text-center my-5 d-none">
            <div class="spinner-grow text-dark" role="status"></div>
            <p class="mt-3 fw-medium text-secondary">Analizando tiendas oficiales...</p>
        </div>

        <div class="row g-4 mb-5" id="contenedor-resultados"></div>
    </div>

    <script>
        document.getElementById('formulario-busqueda').addEventListener('submit', async function (e) {
            e.preventDefault();

            // 1. Capturamos los valores de la interfaz
            const queryValue = document.getElementById('input-perfume').value;
            const modo = document.querySelector('input[name="modoBusqueda"]:checked').value;
            const contenedor = document.getElementById('contenedor-resultados');
            const cargando = document.getElementById('cargando');

            // 2. Limpiamos y mostramos carga
            contenedor.innerHTML = '';
            cargando.classList.remove('d-none');

            try {
                // 3. Petición a la API (Usamos queryValue aquí)
                const response = await fetch(`/api/buscar?q=${encodeURIComponent(queryValue)}&modo=${modo}`);
                const data = await response.json();

                cargando.classList.add('d-none');

                if (!response.ok) throw new Error(data.error || 'Error en el servidor');

                if (!data.resultados || data.resultados.length === 0) {
                    contenedor.innerHTML = `<div class="col-12 text-center mt-5"><div class="alert alert-light border shadow-sm">No encontramos resultados para "${queryValue}" en este modo.</div></div>`;
                    return;
                }

                // 4. Renderizado de tarjetas
                data.resultados.forEach(item => {
                    let tienda = "Tienda";
                    if (item.link.includes('juleriaque')) tienda = "Juleriaque";
                    else if (item.link.includes('parfumerie')) tienda = "Parfumerie";
                    else if (item.link.includes('rouge')) tienda = "Rouge";

                    let precioDisplay;
                    if (item.precio && item.precio === 'Ver precio en sitio') {
                        precioDisplay = `<div class="price-tag-pending mb-2">${item.precio}</div>`;
                    } else if (item.precio) {
                        precioDisplay = `<div class="price-tag mb-2">${item.precio}</div>`;
                    } else {
                        precioDisplay = modo === 'precios' ? '' : `<div class="text-muted small mb-2"><em>Precio no listado</em></div>`;
                    }

                    const tarjeta = `
                    <div class="col-md-6 col-lg-4">
                        <div class="card perfume-card shadow-sm p-3">
                            <div class="card-body d-flex flex-column">
                                <div class="d-flex justify-content-between mb-3">
                                    <span class="badge rounded-pill bg-light text-dark border store-badge px-3">${tienda}</span>
                                    ${modo === 'precios' ? '<span class="badge bg-success-subtle text-success">Oferta Detectada</span>' : ''}
                                </div>
                                <h6 class="card-title fw-bold text-dark mb-1">${item.titulo}</h6>
                                ${precioDisplay}
                                <p class="card-text text-secondary small flex-grow-1 mt-2">${item.descripcion}</p>
                                <a href="${item.link}" target="_blank" class="btn ${modo === 'precios' ? 'btn-success' : 'btn-outline-dark'} w-100 mt-3 fw-bold">Ver en tienda</a>
                            </div>
                        </div>
                    </div>
                `;
                    contenedor.innerHTML += tarjeta;
                });

            } catch (error) {
                cargando.classList.add('d-none');
                contenedor.innerHTML = `<div class="col-12"><div class="alert alert-danger text-center">Error: ${error.message}</div></div>`;
            }
        });
    </script>
</body>

</html>

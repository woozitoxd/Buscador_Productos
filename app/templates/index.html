<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Perfumes Arg</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .hero-section {
            padding: 80px 0 40px 0;
        }

        .perfume-card {
            transition: transform 0.2s;
            height: 100%;
        }

        .perfume-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .store-badge {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="row justify-content-center hero-section">
            <div class="col-md-8 text-center">
                <h1 class="display-5 fw-bold mb-3">Encontrá tu Perfume</h1>
                <p class="lead text-muted mb-4">Buscamos disponibilidad en las principales perfumerías de Argentina.</p>

                <form id="formulario-busqueda" class="d-flex shadow-sm rounded">
                    <input type="text" id="input-perfume" class="form-control form-control-lg border-0"
                        placeholder="Ej: Dior Sauvage, Acqua di Gio..." required>
                    <button type="submit" class="btn btn-dark btn-lg px-4">Buscar</button>
                </form>
            </div>
        </div>

        <div id="cargando" class="text-center my-5 d-none">
            <div class="spinner-border text-dark" role="status" style="width: 3rem; height: 3rem;">
                <span class="visually-hidden">Buscando...</span>
            </div>
            <p class="mt-2 text-muted">Consultando perfumerías...</p>
        </div>

        <div class="row g-4 mb-5" id="contenedor-resultados">
        </div>
    </div>

    <script>
        document.getElementById('formulario-busqueda').addEventListener('submit', async function (e) {
            e.preventDefault(); // Evita que la página se recargue

            const inputPerfume = document.getElementById('input-perfume').value;
            const contenedorResultados = document.getElementById('contenedor-resultados');
            const cargando = document.getElementById('cargando');

            // Limpiamos resultados anteriores y mostramos el spinner
            contenedorResultados.innerHTML = '';
            cargando.classList.remove('d-none');

            try {
                // Llamamos a tu endpoint JSON
                const response = await fetch(`/api/buscar?q=${encodeURIComponent(inputPerfume)}`);
                const data = await response.json();

                cargando.classList.add('d-none'); // Ocultamos el spinner

                if (!response.ok) {
                    contenedorResultados.innerHTML = `<div class="alert alert-danger w-100 text-center">${data.error || 'Hubo un error en la búsqueda'}</div>`;
                    return;
                }

                if (data.resultados.length === 0) {
                    contenedorResultados.innerHTML = `<div class="alert alert-warning w-100 text-center">No se encontraron resultados para "${data.busqueda}".</div>`;
                    return;
                }

                // Renderizamos las tarjetas de Bootstrap iterando sobre el JSON
                data.resultados.forEach(item => {
                    // Pequeña lógica para extraer el nombre de la tienda desde la URL
                    let tienda = "Tienda Oficial";
                    if (item.link.includes('juleriaque')) tienda = "Juleriaque";
                    if (item.link.includes('parfumerie')) tienda = "Parfumerie";
                    if (item.link.includes('rouge')) tienda = "Rouge";

                    const tarjeta = `
                    <div class="col-md-6 col-lg-4">
                        <div class="card perfume-card border-0 shadow-sm">
                            <div class="card-body d-flex flex-column">
                                <span class="badge bg-secondary mb-2 align-self-start store-badge">${tienda}</span>
                                <h5 class="card-title fw-bold">${item.titulo}</h5>
                                <p class="card-text text-muted small flex-grow-1">${item.descripcion}</p>
                                <a href="${item.link}" target="_blank" class="btn btn-outline-dark mt-3 w-100">Ver producto</a>
                            </div>
                        </div>
                    </div>
                `;
                    contenedorResultados.innerHTML += tarjeta;
                });

            } catch (error) {
                cargando.classList.add('d-none');
                contenedorResultados.innerHTML = `<div class="alert alert-danger w-100 text-center">Error de conexión con el servidor.</div>`;
            }
        });
    </script>

</body>

</html>
